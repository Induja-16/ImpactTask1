<!DOCTYPE html>
<html>
<head>
    <!-- Google Tag Manager -->
<script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-KX3CPDS2');</script>
    <!-- End Google Tag Manager -->
</head>

<body>
    <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KX3CPDS2"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    
<h1 id="product-name">Super Widget</h1>
<span id="product-price">19.99</span>
<button id="send-data-btn">Send Product Data</button>

<script>

  // Ensure dataLayer exists
window.dataLayer = window.dataLayer || [];

// When page loads, push product data to GTM
window.addEventListener('load', function () {
  var productName = document.getElementById('product-name').innerText;
  var productPrice = document.getElementById('product-price').innerText;

   // Push event and data into dataLayer
  dataLayer.push({
    event: 'productView',
    productName: productName,
    productPrice: productPrice
  });
});
</script>

<script>
  document.getElementById("send-data-btn").addEventListener("click", function () {
  
    // Get latest event from dataLayer
    const lastEvent = window.dataLayer[window.dataLayer.length - 1];

    // Handling error
    if (!lastEvent) {
      console.error("No data found in dataLayer");
      return;
    }
  
   // Create request body using dataLayer values
    const requestData = {
      productName: lastEvent.productName,
      productPrice: lastEvent.productPrice
    };

  // Sending API POST Request
    fetch("https://httpbin.org/post", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify(requestData)
    })
    .then(response => response.json())
    .then(data => console.log("API Response:", data))
    .catch(error => console.error("Error:", error));
  });
  </script>

</body>
</html>
