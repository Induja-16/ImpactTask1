<!DOCTYPE html>
<html>
<head>
  <title>GTM Product Test</title>

  <!-- GTM -->
  <script>
  (function(w,d,s,l,i){w[l]=w[l]||[];
  w[l].push({'gtm.start': new Date().getTime(), event:'gtm.js'});
  var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s), dl=l!='dataLayer'?'&l='+l:'';
  j.async=true; j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;
  f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-XXXXXXX');
  </script>
</head>

<body>

<h1 id="product-name">Super Widget</h1>
<span id="product-price">19.99</span>

<script>
window.dataLayer = window.dataLayer || [];

window.addEventListener('load', function () {
  var productName = document.getElementById('product-name').innerText;
  var productPrice = document.getElementById('product-price').innerText;

  dataLayer.push({
    event: 'productView',
    productName: productName,
    productPrice: productPrice
  });
});
</script>

</body>
</html>
